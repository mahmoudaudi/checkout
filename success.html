<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed — Checkout</title>
  <link rel="icon" type="image/png" href="/assets/images/e-commerce%20with%20name.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base/base.css">
  <link rel="stylesheet" href="css/layout/layout.css">
  <link rel="stylesheet" href="css/components/button.css">
  <link rel="stylesheet" href="css/pages/result.css">
  <style>html, body { height: 100%; } #app { min-height: 100%; display: flex; flex-direction: column; }</style>
  <script>(function(){try{const s=JSON.parse(sessionStorage.getItem('checkout')||'{}');if((s.step||0)<5)location.replace('personal-info.html');}catch(e){location.replace('personal-info.html');}})();</script>
</head>
<body>
  <main class="page page--centered" id="app">

    <article class="result result--success" aria-label="Order confirmed">

      <!-- Background glow blobs -->
      <div class="result__deco result__deco--top-right result__deco--success" aria-hidden="true"></div>
      <div class="result__deco result__deco--bottom-left result__deco--purple" aria-hidden="true"></div>

      <!-- Success icon -->
      <div class="result__icon-wrap" aria-hidden="true">
        <div class="result__pulse result__pulse--success"></div>
        <div class="result__icon-circle result__icon-circle--success">
          <i data-lucide="check" width="28" height="28" stroke-width="2.5" aria-hidden="true"></i>
        </div>
      </div>

      <!-- Title -->
      <h1 class="result__title result__title--success">Payment Successful!</h1>
      <p class="result__subtitle">Your order has been confirmed and is being processed</p>

      <!-- Order number card -->
      <div class="result__order-card">
        <p class="result__order-label">
          <i data-lucide="package" width="14" height="14" aria-hidden="true"></i>
          Order Number
        </p>
        <div class="result__order-number-row">
          <p class="result__order-number" id="order-number">—</p>
          <button type="button" class="result__copy-btn" id="copy-order-btn" aria-label="Copy order number">
            <i data-lucide="copy" width="14" height="14" aria-hidden="true"></i>
            <span>Copy</span>
          </button>
        </div>
      </div>

      <!-- Info cards row -->
      <div class="result__info-grid" id="info-grid">
        <!-- Populated by JS -->
      </div>

      <!-- Delivery estimate -->
      <div class="result__delivery">
        <p class="result__delivery-label">Estimated Delivery</p>
        <p class="result__delivery-value" id="delivery-date">—</p>
      </div>

      <!-- Actions -->
      <div class="result__actions">
        <button type="button" class="btn btn--primary btn--full btn--icon-start btn--pulse" id="continue-shopping-btn">
          <i data-lucide="house" width="20" height="20" aria-hidden="true"></i>
          <span>Continue Shopping</span>
        </button>
        <button type="button" class="btn btn--secondary btn--full" id="print-receipt-btn">
          <i data-lucide="printer" width="20" height="20" aria-hidden="true"></i>
          <span>Print Receipt</span>
        </button>
      </div>

    </article>

  </main>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/shared/state.js"></script>
  <script src="js/pages/success.js"></script>
</body>
</html>
