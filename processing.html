<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Processing Payment â€” Checkout</title>
  <link rel="icon" type="image/png" href="/assets/images/e-commerce%20with%20name.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components/button.css">
  <link rel="stylesheet" href="css/pages/processing.css">
  <style>html, body { height: 100%; } #app { min-height: 100%; display: flex; flex-direction: column; }</style>
</head>
<body>
  <main class="page page--centered" id="app">

    <div class="processing" role="status" aria-live="polite" aria-label="Processing your payment">

      <!-- Spinner -->
      <div class="processing__icon-wrap" aria-hidden="true">
        <div class="processing__ping"></div>
        <div class="processing__spinner">
          <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        </div>
      </div>

      <!-- Title with animated dots -->
      <h1 class="processing__title" id="processing-title">
        Processing Payment<span class="processing__dots" aria-hidden="true" id="dots"></span>
      </h1>
      <p class="processing__subtitle">Please wait while we securely process your payment</p>

      <!-- Progress bar -->
      <div class="processing__progress" role="progressbar"
           aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"
           aria-labelledby="processing-title">
        <div class="processing__progress-bar" id="progress-bar" style="width: 0%"></div>
      </div>

      <!-- Security steps -->
      <ul class="processing__steps">
        <li class="processing__step">
          <span class="processing__step-icon processing__step-icon--green" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
          </span>
          <span>Verifying card details</span>
        </li>
        <li class="processing__step">
          <span class="processing__step-icon processing__step-icon--blue" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </span>
          <span>Securing transaction</span>
        </li>
        <li class="processing__step">
          <span class="processing__step-icon processing__step-icon--purple" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <span>Finalizing payment</span>
        </li>
      </ul>

      <!-- Warning -->
      <aside class="processing__warning" role="note">
        <p>Do not close this window or press the back button</p>
      </aside>

    </div>

  </main>

  <script src="js/pages/processing.js"></script>
</body>
</html>
